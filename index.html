<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมโดมิโน่ต่อมไร้ท่อ (Endocrine Dominoes Chain)</title>
    <style>
        :root { --bg: #ecf0f1; --card-bg: #ffffff; --success: #2ecc71; --primary: #2c3e50; }
        body { font-family: sans-serif; background-color: var(--bg); padding: 20px; text-align: center; }
        .controls { margin-bottom: 20px; }
        .timer { font-size: 28px; font-weight: bold; margin: 10px; }
        .pool-zone, .chain-zone { background: var(--card-bg); border: 2px solid #ccc; padding: 15px; min-height: 100px; display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; border-radius: 10px; justify-content: center; }
        .leaderboard-section { max-width: 500px; margin: 30px auto; background: var(--card-bg); padding: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

    <h1>เกมโดมิโน่ต่อมไร้ท่อ (Endocrine Dominoes Chain)</h1>
    <div class="controls">
        <div class="timer" id="timer-display">00:00</div>
        <button id="reset-btn">🔄 เริ่มเกมใหม่</button>
        <button id="check-btn" style="background:var(--success); color:white; border:none; padding:10px;">🔍 ตรวจสอบคำตอบ</button>
    </div>

    <div id="pool-zone" class="pool-zone"></div>
    <div id="chain-zone" class="chain-zone"></div>
    <div id="status-bar" style="font-weight:bold;">วางการ์ดใบแรกเพื่อเริ่มจับเวลา</div>

    <div class="leaderboard-section">
        <h3>🏆 เวลาที่ดีที่สุดของคุณ <span style="font-size: 0.7em; color: gray;">(เครื่องนี้เครื่องเดียว)</span></h3>
        <table>
            <thead><tr><th>อันดับ</th><th>สถิติเวลา</th></tr></thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
    </div>

    <script>
        let timerSeconds = 0, timerInterval = null, isTimerStarted = false;

        function formatTime(s) { return Math.floor(s / 60).toString().padStart(2, '0') + ":" + (s % 60).toString().padStart(2, '0'); }

        function startTimer() {
            if (!isTimerStarted) {
                isTimerStarted = true;
                timerInterval = setInterval(() => {
                    timerSeconds++;
                    document.getElementById('timer-display').innerText = formatTime(timerSeconds);
                }, 1000);
            }
        }

        // เริ่มเกมใหม่ (Double Confirm)
        document.getElementById('reset-btn').onclick = () => {
            if (confirm("ล้างกระดานและเริ่มใหม่ทั้งหมดใช่หรือไม่?")) {
                if (confirm("การ์ดที่เล่นค้างไว้จะหายไป ยืนยันอีกครั้ง?")) {
                    location.reload();
                }
            }
        };

        // ตรวจสอบคำตอบและบันทึกเวลาถ้าชนะ
        document.getElementById('check-btn').onclick = () => {
            // สมมติว่าเมื่อตรวจแล้วชนะ (คุณสามารถใส่ Logic ตรวจสอบคำตอบของคุณที่นี่)
            let isWin = true; 
            if(isWin) {
                clearInterval(timerInterval);
                let bestTime = parseInt(localStorage.getItem('best_time') || 9999);
                if(timerSeconds < bestTime) {
                    localStorage.setItem('best_time', timerSeconds);
                    alert("ยินดีด้วย! คุณทำเวลาใหม่ที่ดีที่สุดได้แล้ว: " + formatTime(timerSeconds));
                }
                loadLeaderboard();
            }
        };

        function loadLeaderboard() {
            let bestTime = localStorage.getItem('best_time');
            const tbody = document.getElementById('leaderboard-body');
            if(bestTime) {
                tbody.innerHTML = `<tr><td>🥇</td><td>${formatTime(bestTime)}</td></tr>`;
            }
        }

        // เริ่มจับเวลาเมื่อมีการคลิกที่โซนการ์ด
        document.getElementById('pool-zone').onclick = () => { if(!isTimerStarted) startTimer(); };

        loadLeaderboard();
    </script>
</body>
</html>
