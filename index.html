<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมต่อการ์ดระบบต่อมไร้ท่อ v2 (Theme Toggle)</title>
    <style>
        /* ☀️ โหมดสว่าง (Light Mode) เป็นค่าเริ่มต้น */
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #ecf0f1;
            --card-bg: #ffffff;
            --success: #2ecc71;
            --info: #3498db;
            --text-color: #2c3e50;
            --text-left: #2c3e50;
            --text-right: #c0392b;
            --card-left-bg: #fdfdfd;
            --card-right-bg: #f7f9fa;
            --border-color: #bdc3c7;
            --pool-bg: rgba(255,255,255,0.7);
            --chain-bg: #ffffff;
            --box-shadow: rgba(0,0,0,0.08);
        }

        /* 🌙 โหมดมืด (Dark Mode) */
        [data-theme="dark"] {
            --primary: #ecf0f1;
            --accent: #e74c3c;
            --bg: #1a1c1e;
            --card-bg: #2c2c2c;
            --success: #2ecc71;
            --info: #3498db;
            --text-color: #e0e0e0;
            --text-left: #ecf0f1;
            --text-right: #ff6b6b;
            --card-left-bg: #333333;
            --card-right-bg: #3a3a3a;
            --border-color: #444444;
            --pool-bg: rgba(44,44,44,0.5);
            --chain-bg: #222222;
            --box-shadow: rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s, color 0.3s;
        }
        header { text-align: center; margin-bottom: 20px; position: relative; padding-top: 40px; }
        h1 { margin: 0 0 10px 0; color: var(--text-color); font-size: 2rem; }
        
        /* ปุ่มสลับโหมดมุมขวาบน */
        .theme-toggle-btn {
            position: absolute;
            top: 0;
            right: 0;
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 2px 5px var(--box-shadow);
            transition: all 0.2s;
        }
        .theme-toggle-btn:hover { transform: scale(1.05); }

        .instructions {
            background: var(--card-bg); padding: 15px; border-radius: 8px;
            max-width: 900px; margin: 0 auto 20px auto;
            box-shadow: 0 2px 5px var(--box-shadow); font-size: 14px; line-height: 1.6;
        }
        .controls { text-align: center; margin-bottom: 20px; }
        
        /* ปุ่มคำสั่งทั่วไป */
        .controls button {
            background-color: #2c3e50; color: white; border: none;
            padding: 10px 20px; font-size: 15px; border-radius: 5px;
            cursor: pointer; transition: background 0.2s, transform 0.1s; margin: 5px;
        }
        [data-theme="dark"] .controls button#reset-btn { background-color: #4a5568; }
        .controls button:hover { opacity: 0.9; }
        .controls button:active { transform: scale(0.98); }
        
        .game-container { max-width: 1300px; margin: 0 auto; }
        .section-title { font-weight: bold; margin: 15px 0 5px 0; font-size: 16px; }

        /* พื้นที่วางการ์ด */
        .pool-zone {
            background: var(--pool-bg); border: 2px dashed var(--border-color); border-radius: 10px;
            padding: 15px; min-height: 120px; display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px;
        }
        .chain-zone {
            background: var(--chain-bg); border: 2px solid var(--border-color); border-radius: 10px;
            padding: 25px 20px; min-height: 180px; display: flex; flex-wrap: wrap; gap: 12px;
            align-items: center; box-shadow: inset 0 2px 10px var(--box-shadow);
        }
        
        /* รูปทรงการ์ดโดมิโน่ */
        .domino-card {
            background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 6px;
            width: 175px; height: 75px; display: flex; flex-shrink: 0; cursor: pointer;
            user-select: none; box-shadow: 0 4px 6px var(--box-shadow); position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card-half {
            width: 50%; padding: 6px; display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 11px; font-weight: 600; word-break: break-word;
        }
        .card-left { border-right: 1px dashed var(--border-color); background-color: var(--card-left-bg); color: var(--text-left); border-top-left-radius: 4px; border-bottom-left-radius: 4px; }
        .card-right { background-color: var(--card-right-bg); color: var(--text-right); border-top-right-radius: 4px; border-bottom-right-radius: 4px; }

        /* ลูกศรเชื่อมต่อ */
        .arrow-container { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 18px; color: #7f8c8d; user-select: none; flex-shrink: 0; }
        .arrow-error { color: var(--accent); font-size: 11px; font-weight: bold; margin-top: 2px; background: #fdf2f2; padding: 2px 4px; border-radius: 3px; border: 1px solid rgba(231, 76, 60, 0.2); white
