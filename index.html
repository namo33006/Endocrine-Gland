<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมต่อการ์ดระบบต่อมไร้ท่อ (Endocrine Dominoes Chain)</title>
    <style>
        /* ☀️ โหมดสว่าง (Light Mode) */
        :root {
            --primary: #2c3e50; --accent: #e74c3c; --bg: #ecf0f1;
            --card-bg: #ffffff; --success: #2ecc71; --info: #3498db;
            --text-color: #2c3e50; --border-color: #bdc3c7;
            --pool-bg: rgba(255,255,255,0.7); --box-shadow: rgba(0,0,0,0.08);
        }
        [data-theme="dark"] {
            --primary: #ecf0f1; --accent: #e74c3c; --bg: #1a1c1e;
            --card-bg: #2c2c2c; --text-color: #e0e0e0; --border-color: #444444;
            --pool-bg: rgba(44,44,44,0.5); --box-shadow: rgba(0,0,0,0.4);
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text-color); margin: 0; padding: 20px; transition: 0.3s; }
        header { text-align: center; margin-bottom: 20px; position: relative; }
        .theme-toggle-btn { position: absolute; top: 0; right: 0; padding: 8px 15px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color); }
        
        .controls { text-align: center; margin-bottom: 20px; }
        .controls button { background-color: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        
        .timer-display { display: inline-block; font-size: 24px; font-weight: bold; margin: 0 15px; vertical-align: middle; }

        .game-container { max-width: 1300px; margin: 0 auto; }
        .pool-zone { background: var(--pool-bg); border: 2px dashed var(--border-color); padding: 15px; min-height: 120px; display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; border-radius: 10px; }
        .chain-zone { background: var(--card-bg); border: 2px solid var(--border-color); padding: 20px; min-height: 180px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; border-radius: 10px; box-shadow: 0 2px 5px var(--box-shadow); }
        
        .domino-card { background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 6px; width: 175px; height: 75px; display: flex; cursor: pointer; box-shadow: 0 2px 4px var(--box-shadow); }
        .card-half { width: 50%; padding: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; text-align: center; border-right: 1px dashed var(--border-color); }
        
        .status-bar { text-align: center; margin-top: 20px; font-weight: bold; padding: 15px; }
        
        .leaderboard-section { max-width: 600px; margin: 30px auto; background: var(--card-bg); padding: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid var(--border-color); text-align: left; }
    </style>
</head>
<body>

    <header>
        <button class="theme-toggle-btn" id="theme-toggle-btn">🌙</button>
        <h1>เกมต่อโดมิโน่ต่อมไร้ท่อ (Endocrine Dominoes Chain)</h1>
    </header>

    <div class="controls">
        <div class="timer-display" id="timer-display">00:00</div>
        <button id="reset-btn">🔄 เริ่มเกมใหม่</button>
        <button id="check-btn" style="background-color: var(--success);">🔍 ตรวจสอบ</button>
    </div>

    <div class="game-container">
        <div id="pool-zone" class="pool-zone"></div>
        <div id="chain-zone" class="chain-zone"></div>
        <div id="status-bar" class="status-bar">เริ่มวางการ์ดใบแรกเพื่อเริ่มจับเวลา</div>
    </div>

    <div class="leaderboard-section">
        <h3>🏆 Leaderboard</h3>
        <table id="leaderboard-table">
            <thead><tr><th>อันดับ</th><th>ชื่อ</th><th>เวลา</th></tr></thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
    </div>

    <script>
        // ... (ข้อมูล masterCards และ relationships เหมือนเดิม)
        const masterCards = [
            { id: 1, left: "Adrenal Cortex", right: "Estrogen" }, { id: 17, left: "Ovary", right: "Calcitonin" },
            { id: 3, left: "Thyroid Gland", right: "Minarocorticoid" }, { id: 4, left: "Adrenal Cortex", right: "Prolactin" },
            { id: 5, left: "Anterior Pituitary", right: "Triiodothyronine" }, { id: 11, left: "Thyroid Gland", right: "LH" },
            { id: 6, left: "Anterior Pituitary", right: "Melatonin" }, { id: 20, left: "Pineal Gland", right: "Glucagon" },
            { id: 15, left: "Pancreas", right: "Nor Epinephrine" }, { id: 7, left: "Adrenal Medulla", right: "Secretin" },
            { id: 2, left: "Small Intestine", right: "Erythropoietin" }, { id: 13, left: "Kidney", right: "HCG" },
            { id: 26, left: "Placenta", right: "ACTH" }, { id: 12, left: "Anterior Pituitary", right: "Parathormone" },
            { id: 24, left: "Parathyroid Gland", right: "Sex hormone" }, { id: 14, left: "Adrenal Cortex", right: "Thyroxin" },
            { id: 27, left: "Thyroid Gland", right: "Thymosin" }, { id: 8, left: "Thymus", right: "Progesterone" },
            { id: 21, left: "Ovary", right: "Glucocorticoid" }, { id: 18, left: "Adrenal Cortex", right: "Epinephrine" },
            { id: 10, left: "Adrenal Medulla", right: "Renin" }, { id: 23, left: "Kidney", right: "Antidiuretic Hormone ADH" },
            { id: 16, left: "Posterior Pituitary", right: "Gastrin" }, { id: 9, left: "Stomach", right: "TSH" },
            { id: 22, left: "Anterior Pituitary", right: "Cortisol" }, { id: 31, left: "Adrenal Cortex", right: "Testosterone" },
            { id: 28, left: "Testis", right: "Growth hormone" }, { id: 29, left: "Anterior Pituitary", right: "Insulin" },
            { id: 19, left: "Pancreas", right: "FSH" }, { id: 25, left: "Anterior Pituitary", right: "Oxytocin" },
            { id: 30, left: "Posterior Pituitary", right: "Aldosterone" }
        ];

        let currentChain = [];
        let timerSeconds = 0;
        let timerInterval = null;
        let isTimerStarted = false;

        function startTimer() {
            if (!isTimerStarted) {
                isTimerStarted = true;
                timerInterval = setInterval(() => {
                    timerSeconds++;
                    document.getElementById('timer-display').innerText = formatTime(timerSeconds);
                }, 1000);
            }
        }

        function formatTime(s) {
            return Math.floor(s / 60).toString().padStart(2, '0') + ":" + (s % 60).toString().padStart(2, '0');
        }

        // เมื่อมีการเพิ่มการ์ดลง Chain ให้เช็คว่าใช่ใบแรกไหม ถ้าใช่ให้เริ่มจับเวลา
        function addToChain(card) {
            if (currentChain.length === 0) startTimer();
            currentChain.push(card);
            // ... (โค้ดการแสดงผล)
        }

        // ... (ฟังก์ชันอื่นๆ ตามโครงสร้างเดิม)
        document.getElementById('reset-btn').onclick = () => {
            if(confirm("เริ่มใหม่ใช่ไหม?")) {
                clearInterval(timerInterval);
                isTimerStarted = false;
                timerSeconds = 0;
                document.getElementById('timer-display').innerText = "00:00";
                // ... รีเซ็ตเกม
            }
        };
    </script>
</body>
</html>
