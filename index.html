<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมโดมิโน่ต่อมไร้ท่อ (Endocrine Dominoes Chain)</title>
    <style>
        :root { --bg: #ecf0f1; --card-bg: #ffffff; --success: #2ecc71; --primary: #2c3e50; }
        body { font-family: sans-serif; background-color: var(--bg); padding: 15px; text-align: center; color: var(--primary); }
        .controls { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .timer { font-size: 32px; font-weight: bold; margin: 10px; display: block; width: 100%; }
        /* ปรับปุ่มให้ขนาดเท่ากัน */
        .controls button { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; flex: 1; max-width: 150px; }
        #reset-btn { background: #95a5a6; color: white; }
        #check-btn { background: var(--success); color: white; }
        
        .pool-zone, .chain-zone { background: #dfe6e9; border: 2px dashed #b2bec3; padding: 10px; min-height: 120px; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; border-radius: 10px; justify-content: center; }
        .domino-card { background: #fff; border: 1px solid #7f8c8d; padding: 8px; cursor: pointer; width: 130px; font-size: 11px; border-radius: 4px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        
        .leaderboard-section { max-width: 400px; margin: 20px auto; background: var(--card-bg); padding: 15px; border-radius: 10px; border: 1px solid #ccc; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

    <h1>เกมโดมิโน่ต่อมไร้ท่อ (Endocrine Dominoes Chain)</h1>
    <div class="controls">
        <div class="timer" id="timer-display">00:00</div>
        <button id="reset-btn">🔄 เริ่มเกมใหม่</button>
        <button id="check-btn">🔍 ตรวจสอบ</button>
    </div>

    <div id="pool-zone" class="pool-zone"></div>
    <div id="chain-zone" class="chain-zone"></div>
    <div id="status-bar" style="font-weight:bold; margin-bottom:10px;">วางการ์ดใบแรกเพื่อเริ่มจับเวลา</div>

    <div class="leaderboard-section">
        <h3>🏆 เวลาที่ดีที่สุดของคุณ (คนอื่นจะไม่เห็นเวลาของคุณ)</h3>
        <table>
            <tr><td>เวลาที่เร็วที่สุด: <span id="best-time-val">-</span></td></tr>
        </table>
    </div>

    <script>
        const masterCards = [
            { id: 1, left: "Adrenal Cortex", right: "Estrogen" }, { id: 17, left: "Ovary", right: "Calcitonin" },
            { id: 3, left: "Thyroid Gland", right: "Minarocorticoid" }, { id: 4, left: "Adrenal Cortex", right: "Prolactin" },
            { id: 5, left: "Anterior Pituitary", right: "Triiodothyronine" }, { id: 11, left: "Thyroid Gland", right: "LH" },
            { id: 6, left: "Anterior Pituitary", right: "Melatonin" }, { id: 20, left: "Pineal Gland", right: "Glucagon" },
            { id: 15, left: "Pancreas", right: "Nor Epinephrine" }, { id: 7, left: "Adrenal Medulla", right: "Secretin" },
            { id: 2, left: "Small Intestine", right: "Erythropoietin" }, { id: 13, left: "Kidney", right: "HCG" },
            { id: 26, left: "Placenta", right: "ACTH" }, { id: 12, left: "Anterior Pituitary", right: "Parathormone" },
            { id: 24, left: "Parathyroid Gland", right: "Sex hormone" }, { id: 14, left: "Adrenal Cortex", right: "Thyroxin" },
            { id: 27, left: "Thyroid Gland", right: "Thymosin" }, { id: 8, left: "Thymus", right: "Progesterone" },
            { id: 21, left: "Ovary", right: "Glucocorticoid" }, { id: 18, left: "Adrenal Cortex", right: "Epinephrine" },
            { id: 10, left: "Adrenal Medulla", right: "Renin" }, { id: 23, left: "Kidney", right: "Antidiuretic Hormone ADH" },
            { id: 16, left: "Posterior Pituitary", right: "Gastrin" }, { id: 9, left: "Stomach", right: "TSH" },
            { id: 22, left: "Anterior Pituitary", right: "Cortisol" }, { id: 31, left: "Adrenal Cortex", right: "Testosterone" },
            { id: 28, left: "Testis", right: "Growth hormone" }, { id: 29, left: "Anterior Pituitary", right: "Insulin" },
            { id: 19, left: "Pancreas", right: "FSH" }, { id: 25, left: "Anterior Pituitary", right: "Oxytocin" },
            { id: 30, left: "Posterior Pituitary", right: "Aldosterone" }
        ];

        let timerSeconds = 0, timerInterval = null, isTimerStarted = false;

        // ฟังก์ชันสร้างการ์ดลงหน้าจอ
        function renderCards() {
            const pool = document.getElementById('pool-zone');
            pool.innerHTML = '';
            masterCards.forEach(c => {
                const div = document.createElement('div');
                div.className = 'domino-card';
                div.innerHTML = `<b>${c.left}</b> | ${c.right}`;
                div.onclick = () => startTimer(); // คลิกที่การ์ด = เริ่มจับเวลา
                pool.appendChild(div);
            });
        }

        function formatTime(s) { return Math.floor(s / 60).toString().padStart(2, '0') + ":" + (s % 60).toString().padStart(2, '0'); }

        function startTimer() {
            if (!isTimerStarted) {
                isTimerStarted = true;
                timerInterval = setInterval(() => {
                    timerSeconds++;
                    document.getElementById('timer-display').innerText = formatTime(timerSeconds);
                }, 1000);
            }
        }

        document.getElementById('reset-btn').onclick = () => location.reload();
        
        document.getElementById('check-btn').onclick = () => {
            alert("บันทึกเวลาของคุณแล้ว!");
            clearInterval(timerInterval);
            let best = localStorage.getItem('best_time') || 9999;
            if(timerSeconds < best) localStorage.setItem('best_time', timerSeconds);
            document.getElementById('best-time-val').innerText = formatTime(localStorage.getItem('best_time'));
        };

        renderCards();
        document.getElementById('best-time-val').innerText = localStorage.getItem('best_time') ? formatTime(localStorage.getItem('best_time')) : "-";
    </script>
</body>
</html>
