<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมต่อการ์ดระบบต่อมไร้ท่อ v2 (Clean Dominoes)</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #ecf0f1;
            --card-bg: #ffffff;
            --success: #2ecc71;
            --info: #3498db;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--primary);
            -webkit-tap-highlight-color: transparent;
        }
        
        header { text-align: center; margin-bottom: 20px; }
        h1 { margin: 0 0 10px 0; color: var(--primary); font-size: 2rem; }
        .instructions {
            background: white; padding: 15px; border-radius: 8px;
            max-width: 900px; margin: 0 auto 20px auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 14px; line-height: 1.6;
        }
        .controls { text-align: center; margin-bottom: 20px; }
        button {
            background-color: var(--primary); color: white; border: none;
            padding: 10px 20px; font-size: 15px; border-radius: 5px;
            cursor: pointer; transition: background 0.2s, transform 0.1s; margin: 5px;
        }
        button:hover { background-color: #34495e; }
        button:active { transform: scale(0.98); }
        
        .game-container { max-width: 1300px; margin: 0 auto; }
        .section-title { font-weight: bold; margin: 15px 0 5px 0; font-size: 16px; }

        /* หน้าจอใหญ่ (คอมพิวเตอร์ / iPad) -> เรียงกระจายเต็มพื้นที่ */
        .pool-zone {
            background: rgba(255,255,255,0.7); border: 2px dashed #bdc3c7; border-radius: 10px;
            padding: 15px; min-height: 120px; display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px;
        }
        .chain-zone {
            background: #ffffff; border: 2px solid #34495e; border-radius: 10px;
            padding: 25px 20px; min-height: 180px; display: flex; flex-wrap: wrap; gap: 12px;
            align-items: center; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }
        .domino-card {
            background: var(--card-bg); border: 2px solid #bdc3c7; border-radius: 6px;
            width: 175px; height: 75px; display: flex; flex-shrink: 0; cursor: pointer;
            user-select: none; box-shadow: 0 4px 6px rgba(0,0,0,0.08); position: relative;
        }
        .card-half {
            width: 50%; padding: 6px; display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 11px; font-weight: 600; word-break: break-word;
        }
        .arrow-container { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 18px; color: #7f8c8d; user-select: none; flex-shrink: 0; }
        .arrow-error { color: var(--accent); font-size: 11px; font-weight: bold; margin-top: 2px; background: #fdf2f2; padding: 2px 4px; border-radius: 3px; border: 1px solid rgba(231, 76, 60, 0.2); white-space: nowrap; }

        .domino-card:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.12); }
        .domino-card.selected { border-color: var(--accent); box-shadow: 0 0 10px rgba(231, 76, 60, 0.6); }
        .domino-card.correct { border-color: var(--success); background-color: #f2f9f4; }
        .domino-card.wrong-connection { border-color: var(--accent); background-color: #fdf2f2; }
        
        .card-left { border-right: 1px dashed #bdc3c7; background-color: #fdfdfd; color: #2c3e50; border-top-left-radius: 4px; border-bottom-left-radius: 4px; }
        .card-right { background-color: #f7f9fa; color: #c0392b; border-top-right-radius: 4px; border-bottom-right-radius: 4px; }

        .placement-actions { text-align: center; background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: none; }
        .placement-actions span { font-weight: bold; margin-right: 15px; color: var(--accent); }
        .placement-btn-group { display: inline-block; }
        .status-bar { text-align: center; margin-top: 25px; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); min-height: 24px; }

        /* 📱 โหมดสำหรับหน้าจอมือถือ (ความกว้างจอน้อยกว่า 767px) -> สไลด์แนวนอน */
        @media (max-width: 767px) {
            body { padding: 10px; }
            h1 { font-size: 1.3rem; margin: 5px 0; }
            header p { font-size: 0.85rem; }
            .instructions { padding: 10px; font-size: 12px; margin-bottom: 12px; }
            .controls { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
            button { padding: 8px 12px; font-size: 13px; border-radius: 6px; flex: 1; max-width: 180px; margin: 0; }
            .section-title { font-size: 14px; margin: 10px 0 5px 0; }
            .status-bar { font-size: 13px; padding: 12px; margin-top: 15px; }

            .pool-zone {
                flex-wrap: nowrap
